name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  grader-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build grader TS image (runs lint+tests)
        run: |
          docker build -f grader/ts/Dockerfile -t assessmentplatform-grader-ts:ci .

      - name: Validate problems (schema)
        run: |
          docker run --rm -w /app assessmentplatform-grader-ts:ci node scripts/validate_problems.mjs
